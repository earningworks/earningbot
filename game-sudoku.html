<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku | Win ₹1500</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #050505;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding: 60px 10px 20px
        }

        #back {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #00d2ff, #4ade80);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #reward {
            color: #4ade80;
            font-weight: 800;
            font-size: .82rem;
            margin-bottom: 6px
        }

        #timer {
            font-size: .95rem;
            color: #fbbf24;
            font-weight: 800;
            margin-bottom: 6px
        }

        #progress-bar-wrap {
            width: min(360px, 95vw);
            margin-bottom: 8px
        }

        #prog-label {
            font-size: .7rem;
            color: rgba(255, 255, 255, .4);
            text-align: center;
            margin-bottom: 3px
        }

        #progress-bar-bg {
            background: rgba(255, 255, 255, .1);
            border-radius: 10px;
            height: 10px;
            overflow: hidden
        }

        #progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #4ade80);
            border-radius: 10px;
            width: 0%;
            transition: width .4s
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 1px;
            background: #444;
            border: 3px solid #888;
            width: min(360px, 95vw);
            height: min(360px, 95vw)
        }

        .cell {
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .1s;
            aspect-ratio: 1
        }

        .cell:hover {
            background: #1a1a2e
        }

        .cell.selected {
            background: #1a3a5e
        }

        .cell.given {
            color: #fff;
            background: #0b0b1e;
            cursor: default
        }

        .cell.editable {
            color: #4ade80
        }

        .cell.error {
            background: #2d0808;
            color: #ff6666
        }

        .cell.correct {
            background: #082d0a;
            color: #4ade80
        }

        .cell.box-right {
            border-right: 2px solid #888
        }

        .cell.box-bottom {
            border-bottom: 2px solid #888
        }

        #numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: min(360px, 95vw)
        }

        .num-btn {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, .1);
            padding: 11px;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer
        }

        .num-btn:hover {
            background: #2a2a4e
        }

        #erase {
            background: #2d0808;
            color: #ff6666
        }

        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            font-size: .88rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 4px
        }

        .btn-g {
            background: #4ade80;
            color: #000
        }

        .btn-r {
            background: #ff4500;
            color: #fff
        }

        .btn-d {
            background: #222;
            color: #fff
        }

        .btn-hint {
            background: #00d2ff;
            color: #000
        }

        #hint-count {
            color: #00d2ff;
            font-size: .75rem;
            font-weight: 800
        }

        #status {
            font-size: .8rem;
            color: rgba(255, 255, 255, .6);
            text-align: center;
            margin-top: 6px
        }

        #toast {
            background: rgba(0, 210, 100, .9);
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: .9rem;
            margin-top: 6px;
            display: none
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .97);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            color: #fff;
            gap: 14px;
            text-align: center;
            padding: 20px
        }
    </style>
</head>

<body>
    <button id="back" onclick="location.href='index.html'">← Back</button>
    <h1>🧩 Sudoku</h1>
    <div id="reward">Fill the grid correctly to WIN ₹1,500!</div>
    <div id="timer">⏱️ <span id="tdisp">0:00</span></div>
    <div id="progress-bar-wrap">
        <div id="prog-label">Cells filled: <span id="filled-count">0</span>/81</div>
        <div id="progress-bar-bg">
            <div id="progress-bar-fill"></div>
        </div>
    </div>
    <div id="hint-count">💡 Hints remaining: <span id="hints">5</span></div>
    <div id="grid"></div>
    <div id="numpad" style="margin-top:10px">
        <button class="num-btn" onclick="enterNum(1)">1</button>
        <button class="num-btn" onclick="enterNum(2)">2</button>
        <button class="num-btn" onclick="enterNum(3)">3</button>
        <button class="num-btn" onclick="enterNum(4)">4</button>
        <button class="num-btn" onclick="enterNum(5)">5</button>
        <button class="num-btn" onclick="enterNum(6)">6</button>
        <button class="num-btn" onclick="enterNum(7)">7</button>
        <button class="num-btn" onclick="enterNum(8)">8</button>
        <button class="num-btn" onclick="enterNum(9)">9</button>
        <button class="num-btn" id="erase" onclick="enterNum(0)">✕</button>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-hint" onclick="useHint()">💡 Hint</button>
        <button class="btn btn-g" onclick="checkSolution()">✅ Check</button>
        <button class="btn btn-d" onclick="newGame()">🔄 New Puzzle</button>
    </div>
    <div id="status">Select a cell, then tap a number. Use Hints if stuck!</div>
    <div id="toast"></div>

    <div id="overlay">
        <div style="font-size:3rem" id="over-ico">🏆</div>
        <h2 id="over-title" style="font-size:2rem"></h2>
        <p id="over-msg"></p>
        <div id="over-btns"></div>
    </div>

    <script>
        const REWARD_URL = "https://emotionallytonightintelligent.com/yefth1e9e?key=672ebfd27cb3a77872d539957b23a796";
        let selectedCell = null, board = [], solution = [], givenMask = [], seconds = 0, timerInt, hintsLeft = 5, lastFilled = 0;

        // Two easy puzzle templates with good solving experience
        const PUZZLES = [
            {
                sol: [[5, 3, 4, 6, 7, 8, 9, 1, 2], [6, 7, 2, 1, 9, 5, 3, 4, 8], [1, 9, 8, 3, 4, 2, 5, 6, 7], [8, 5, 9, 7, 6, 1, 4, 2, 3], [4, 2, 6, 8, 5, 3, 7, 9, 1], [7, 1, 3, 9, 2, 4, 8, 5, 6], [9, 6, 1, 5, 3, 7, 2, 8, 4], [2, 8, 7, 4, 1, 9, 6, 3, 5], [3, 4, 5, 2, 8, 6, 1, 7, 9]],
                given: 35
            }, // 35 given cells = easy puzzle
            {
                sol: [[1, 2, 3, 4, 5, 6, 7, 8, 9], [4, 5, 6, 7, 8, 9, 1, 2, 3], [7, 8, 9, 1, 2, 3, 4, 5, 6], [2, 3, 4, 5, 6, 7, 8, 9, 1], [5, 6, 7, 8, 9, 1, 2, 3, 4], [8, 9, 1, 2, 3, 4, 5, 6, 7], [3, 4, 5, 6, 7, 8, 9, 1, 2], [6, 7, 8, 9, 1, 2, 3, 4, 5], [9, 1, 2, 3, 4, 5, 6, 7, 8]],
                given: 38
            }
        ];

        function showToast(msg, col) {
            const t = document.getElementById('toast'); t.textContent = msg; t.style.background = col || 'rgba(0,210,100,.9)'; t.style.color = '#000';
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
        }

        function genPuzzle() {
            const p = PUZZLES[Math.floor(Math.random() * PUZZLES.length)];
            solution = p.sol.map(r => [...r]);
            board = p.sol.map(r => [...r]);
            givenMask = Array.from({ length: 9 }, () => Array(9).fill(false));
            // Remove cells until we have exactly (81-given) empty cells
            const cellsToRemove = 81 - p.given;
            let removed = 0;
            while (removed < cellsToRemove) {
                const r = Math.floor(Math.random() * 9); const c = Math.floor(Math.random() * 9);
                if (board[r][c] !== 0) { board[r][c] = 0; removed++; }
            }
            for (let r = 0; r < 9; r++)for (let c = 0; c < 9; c++)givenMask[r][c] = board[r][c] !== 0;
        }

        function countFilled() { let f = 0; for (let r = 0; r < 9; r++)for (let c = 0; c < 9; c++)if (board[r][c] !== 0) f++; return f; }

        function renderGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            for (let r = 0; r < 9; r++)for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div'); cell.className = 'cell';
                if (givenMask[r][c]) cell.classList.add('given');
                else { cell.classList.add('editable'); if (board[r][c] && board[r][c] === solution[r][c]) cell.classList.add('correct'); }
                if (c === 2 || c === 5) cell.classList.add('box-right'); if (r === 2 || r === 5) cell.classList.add('box-bottom');
                cell.textContent = board[r][c] || '';
                cell.dataset.r = r; cell.dataset.c = c;
                cell.onclick = () => {
                    if (givenMask[r][c]) return;
                    document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
                    cell.classList.add('selected'); selectedCell = { r, c, el: cell };
                };
                grid.appendChild(cell);
            }
            const filled = countFilled();
            document.getElementById('filled-count').textContent = filled;
            document.getElementById('progress-bar-fill').style.width = Math.round((filled / 81) * 100) + '%';
            // Milestone toasts
            if (filled >= 50 && lastFilled < 50) { showToast('🔥 50+ cells done! Great progress!'); }
            else if (filled >= 65 && lastFilled < 65) { showToast('⚡ 65+ cells! Almost there!'); }
            else if (filled >= 75 && lastFilled < 75) { showToast('🏆 75+ cells! So close to winning!'); }
            lastFilled = filled;
        }

        function enterNum(n) {
            if (!selectedCell) return; const { r, c, el } = selectedCell;
            if (givenMask[r][c]) return;
            board[r][c] = n; el.textContent = n || '';
            el.classList.remove('error', 'correct');
            if (n) {
                if (solution[r][c] !== n) el.classList.add('error');
                else { el.classList.add('correct'); showToast('✅ Correct! Keep going!'); }
            }
            const filled = countFilled();
            document.getElementById('filled-count').textContent = filled;
            document.getElementById('progress-bar-fill').style.width = Math.round((filled / 81) * 100) + '%';
            lastFilled = filled;
        }

        function useHint() {
            if (hintsLeft <= 0) { showToast('No hints left!', 'rgba(200,50,50,.9)'); return; }
            // Find an empty wrong cell and fill it in
            const empties = [];
            for (let r = 0; r < 9; r++)for (let c = 0; c < 9; c++) { if (!givenMask[r][c] && board[r][c] !== solution[r][c]) empties.push({ r, c }); }
            if (!empties.length) { checkSolution(); return; }
            const pick = empties[Math.floor(Math.random() * empties.length)];
            board[pick.r][pick.c] = solution[pick.r][pick.c];
            hintsLeft--; document.getElementById('hints').textContent = hintsLeft;
            renderGrid(); showToast('💡 Hint used! ' + hintsLeft + ' left!', 'rgba(0,180,255,.9)');
        }

        function checkSolution() {
            let allCorrect = true, allFilled = true;
            for (let r = 0; r < 9; r++)for (let c = 0; c < 9; c++) {
                if (board[r][c] === 0) { allFilled = false; break; }
                if (board[r][c] !== solution[r][c]) allCorrect = false;
            }
            if (!allFilled) { document.getElementById('status').textContent = 'Not complete yet! Keep filling!'; return; }
            if (allCorrect) endGame(true);
            else { document.getElementById('status').textContent = 'Some numbers are wrong — check red cells!'; renderGrid(); }
        }

        function endGame(win) {
            clearInterval(timerInt);
            const ol = document.getElementById('overlay'); ol.style.display = 'flex';
            document.getElementById('over-ico').textContent = win ? '🏆' : '❌';
            const m = Math.floor(seconds / 60), s = seconds % 60;
            document.getElementById('over-title').textContent = win ? `SOLVED! ₹1,500` : 'Try Again!';
            document.getElementById('over-msg').textContent = win ? `Completed in ${m}:${s < 10 ? '0' + s : s}! Amazing work!` : 'Fix the errors and check again!';
            document.getElementById('over-btns').innerHTML = win
                ? `<a href="${REWARD_URL}" target="_blank" class="btn btn-g">💰 REDEEM ₹1,500</a><br><button class="btn btn-d" onclick="location.reload()">New Puzzle</button>`
                : `<button class="btn btn-r" onclick="location.reload()">🔄 TRY AGAIN</button><button class="btn btn-d" onclick="location.href='index.html'">← Home</button>`;
        }

        function newGame() {
            clearInterval(timerInt); seconds = 0; selectedCell = null; hintsLeft = 5; lastFilled = 0;
            document.getElementById('hints').textContent = 5;
            genPuzzle(); renderGrid();
            document.getElementById('status').textContent = "Select a cell, then tap a number!";
            timerInt = setInterval(() => { seconds++; const m = Math.floor(seconds / 60), s = seconds % 60; document.getElementById('tdisp').textContent = `${m}:${s < 10 ? '0' + s : s}`; }, 1000);
        }
        newGame();
    </script>
</body>

</html>
