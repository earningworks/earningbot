<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladders | Win ₹1000</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #050505;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding-top: 60px;
            gap: 12px
        }

        #back {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ade80, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #reward {
            color: #4ade80;
            font-weight: 800;
            font-size: .8rem
        }

        #progress-bar-wrap {
            width: min(400px, 95vw)
        }

        #progress-bar-bg {
            background: rgba(255, 255, 255, .1);
            border-radius: 10px;
            height: 10px;
            overflow: hidden
        }

        #progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #fbbf24);
            border-radius: 10px;
            width: 1%;
            transition: width .5s
        }

        #prog-label {
            font-size: .7rem;
            color: rgba(255, 255, 255, .4);
            text-align: center;
            margin-bottom: 3px
        }

        #players-info {
            display: flex;
            gap: 20px;
            font-size: .85rem
        }

        .pinfo {
            padding: 7px 14px;
            border-radius: 10px;
            font-weight: 700;
            text-align: center
        }

        canvas {
            border-radius: 12px;
            max-width: 95vw;
            touch-action: none
        }

        #dice-area {
            display: flex;
            align-items: center;
            gap: 20px
        }

        .dice-face {
            font-size: 3rem;
            min-width: 50px;
            text-align: center
        }

        .dice-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: #fbbf24;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer
        }

        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            border: none;
            font-size: .85rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 4px
        }

        .btn-g {
            background: #4ade80;
            color: #000
        }

        .btn-r {
            background: #ff4500;
            color: #fff
        }

        .btn-d {
            background: #222;
            color: #fff
        }

        #status {
            color: #fbbf24;
            font-size: .85rem;
            min-height: 44px;
            text-align: center;
            max-width: 360px;
            line-height: 1.5
        }

        #toast {
            background: rgba(0, 200, 100, .9);
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: .9rem;
            display: none
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .97);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            color: #fff;
            gap: 16px;
            text-align: center;
            padding: 20px
        }
    </style>
</head>

<body>
    <button id="back" onclick="location.href='index.html'">← Back</button>
    <h1>🐍 Snake & Ladders</h1>
    <div id="reward">Reach Square 100 to WIN ₹1,000!</div>
    <div id="progress-bar-wrap">
        <div id="prog-label">Your Progress 🔴</div>
        <div id="progress-bar-bg">
            <div id="progress-bar-fill"></div>
        </div>
    </div>
    <div id="players-info">
        <div class="pinfo" style="background:rgba(255,68,68,.2);border:1px solid #ff4444">🔴 You: <span
                id="p1pos">1</span></div>
        <div class="pinfo" style="background:rgba(68,68,255,.2);border:1px solid #4444ff">🔵 AI: <span
                id="p2pos">1</span></div>
    </div>
    <canvas id="board" width="400" height="400"></canvas>
    <div id="dice-area">
        <button class="dice-btn" id="rollBtn" onclick="rollDice()">🎲 Roll!</button>
        <div class="dice-face" id="diceface">-</div>
    </div>
    <div id="status">Roll the dice to start!</div>
    <div id="toast" id="toastEl"></div>

    <div id="overlay">
        <div style="font-size:3rem" id="over-ico">🏆</div>
        <h2 id="over-title" style="font-size:2rem"></h2>
        <p id="over-msg"></p>
        <div id="over-btns"></div>
    </div>

    <script>
        const REWARD_URL = "https://emotionallytonightintelligent.com/yefth1e9e?key=672ebfd27cb3a77872d539957b23a796";
        const canvas = document.getElementById('board'); const ctx = canvas.getContext('2d');
        const C = 40; const N = 10;

        // Player-friendly: more ladders for player lane, snakes mostly near top
        const SNAKES = { 99: 28, 89: 70, 75: 42, 62: 28, 54: 44, 47: 32 }; // fewer snakes, smaller drops
        // Lots of ladders for player
        const LADDERS = { 4: 46, 9: 31, 20: 58, 28: 84, 40: 59, 51: 77, 63: 91, 71: 93, 16: 47, 7: 42 };
        // AI snakes — slightly more (but not brutal)
        const AI_SNAKES = { 98: 20, 88: 24, 76: 22, 64: 18, 49: 26, 57: 8 };

        function numToGrid(n) { const idx = n - 1; const row = N - 1 - Math.floor(idx / N); const col = Math.floor(idx / N) % 2 === 0 ? idx % N : N - 1 - idx % N; return { r: row, c: col }; }

        let p1 = 1, p2 = 1, turn = 'p1', gameOver = false, rolling = false;
        const DICE_FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        function showToast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function drawBoard() {
            ctx.clearRect(0, 0, 400, 400);
            for (let sq = 1; sq <= 100; sq++) {
                const { r, c } = numToGrid(sq); const x = c * C, y = r * C;
                ctx.fillStyle = (sq % 2 === 0) ? '#1a1a2e' : '#16213e';
                if (SNAKES[sq]) ctx.fillStyle = '#3d0808';
                if (AI_SNAKES[sq]) ctx.fillStyle = '#320820';
                if (LADDERS[sq]) ctx.fillStyle = '#0d2d0d';
                ctx.fillRect(x, y, C, C); ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5; ctx.strokeRect(x, y, C, C);
                ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.font = '7px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(sq, x + C / 2, y + C / 2);
            }
            Object.entries(SNAKES).forEach(([h, t]) => {
                const hg = numToGrid(+h), tg = numToGrid(+t);
                ctx.strokeStyle = '#ff6666'; ctx.lineWidth = 2.5; ctx.setLineDash([4, 3]);
                ctx.beginPath(); ctx.moveTo(hg.c * C + C / 2, hg.r * C + C / 2); ctx.lineTo(tg.c * C + C / 2, tg.r * C + C / 2); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = '#ff4444'; ctx.font = '13px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🐍', hg.c * C + C / 2, hg.r * C + C / 2);
            });
            Object.entries(LADDERS).forEach(([bot, top]) => {
                const bg = numToGrid(+bot), tg = numToGrid(+top);
                ctx.strokeStyle = '#66ff88'; ctx.lineWidth = 2.5; ctx.setLineDash([4, 3]);
                ctx.beginPath(); ctx.moveTo(bg.c * C + C / 2, bg.r * C + C / 2); ctx.lineTo(tg.c * C + C / 2, tg.r * C + C / 2); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillText('🪜', bg.c * C + C / 2, bg.r * C + C / 2);
            });
            ctx.lineWidth = 1;

            function drawPlayer(pos, color, emoji, xOff) {
                const { r, c } = numToGrid(pos);
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(c * C + C / 2 + xOff, r * C + C / 2, 10, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = '9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, c * C + C / 2 + xOff, r * C + C / 2);
            }
            if (p1 === p2) { drawPlayer(p1, '#ff4444', '🔴', -6); drawPlayer(p2, '#4444ff', '🔵', 6); }
            else { drawPlayer(p1, '#ff4444', '🔴', 0); drawPlayer(p2, '#4444ff', '🔵', 0); }
        }

        function movePlayer(pos, roll, isPlayer) {
            let newPos = pos + roll;
            if (newPos > 100) return pos; // bounce back or stay (not allowed to exceed 100 without exact roll)
            const statusEl = document.getElementById('status');
            const snakeMap = isPlayer ? SNAKES : AI_SNAKES;
            if (snakeMap[newPos]) {
                const drop = newPos - snakeMap[newPos];
                if (isPlayer) showToast('🐍 Snake! Dropped ' + drop + ' squares — keep going!');
                else showToast('🐍 AI hit a snake! Your chance!');
                newPos = snakeMap[newPos];
            } else if (LADDERS[newPos]) {
                const climb = LADDERS[newPos] - newPos;
                if (isPlayer) showToast('🪜 Ladder! Climbed ' + climb + ' squares! Great!');
                newPos = LADDERS[newPos];
            }
            return newPos;
        }

        function rollDice() {
            if (gameOver || rolling || turn !== 'p1') return;
            rolling = true; document.getElementById('rollBtn').disabled = true;
            // Give player slightly better rolls on average (use best of 2 dice)
            const r1 = Math.floor(Math.random() * 6) + 1; const r2 = Math.floor(Math.random() * 6) + 1;
            const roll = Math.max(r1, r2); // Player gets best of 2 dice!
            document.getElementById('diceface').textContent = DICE_FACES[roll - 1];
            const statusEl = document.getElementById('status');
            statusEl.textContent = `You rolled ${roll}! (Best of 2 dice 🎲🎲)`;
            const prev = p1; p1 = movePlayer(p1, roll, true);
            document.getElementById('p1pos').textContent = p1;
            document.getElementById('progress-bar-fill').style.width = Math.min(99, p1) + '%';
            drawBoard();
            if (p1 >= 100) { endGame(true); return; }
            // Milestone
            if (p1 >= 75 && prev < 75) showToast('🔥 75+ squares! Almost there!');
            else if (p1 >= 50 && prev < 50) showToast('⚡ Halfway! Keep rolling!');
            setTimeout(() => { turn = 'p2'; statusEl.textContent = "AI's turn..."; setTimeout(aiRoll, 1000); }, 600);
        }

        function aiRoll() {
            // AI gets single die (player advantage)
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('diceface').textContent = DICE_FACES[roll - 1];
            document.getElementById('status').textContent = `AI rolled ${roll}`;
            p2 = movePlayer(p2, roll, false);
            document.getElementById('p2pos').textContent = p2;
            drawBoard();
            if (p2 >= 100) { endGame(false); return; }
            setTimeout(() => { turn = 'p1'; rolling = false; document.getElementById('rollBtn').disabled = false; document.getElementById('status').textContent = "Your turn — Roll!"; }, 600);
        }

        function endGame(win) {
            if (gameOver) return; gameOver = true;
            const ol = document.getElementById('overlay'); ol.style.display = 'flex';
            document.getElementById('over-ico').textContent = win ? '🏆' : '😔';
            document.getElementById('over-title').textContent = win ? 'YOU WIN! ₹1,000' : 'AI WINS!';
            document.getElementById('over-msg').textContent = win ? 'You reached 100 first!' : 'AI got there first — try again!';
            document.getElementById('over-btns').innerHTML = win
                ? `<a href="${REWARD_URL}" target="_blank" class="btn btn-g">💰 REDEEM ₹1,000</a><br><button class="btn btn-d" onclick="location.reload()">Play Again</button>`
                : `<p style="color:#fbbf24;font-size:.85rem">You were at square ${p1} — so close! Try again!</p><button class="btn btn-r" onclick="location.reload()">🔄 TRY AGAIN</button><button class="btn btn-d" onclick="location.href='index.html'">← Home</button>`;
        }

        drawBoard(); document.getElementById('status').textContent = "Roll the dice! (You get best of 2 dice 🎲🎲)";
    </script>
</body>

</html>
