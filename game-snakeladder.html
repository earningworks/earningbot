<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladders | Win ₹1000</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #050505;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding-top: 60px;
            gap: 15px
        }

        #back {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 400;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4ade80, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #reward {
            font-size: 0.85rem;
            color: #4ade80;
            font-weight: 800
        }

        #status {
            font-size: 0.9rem;
            color: #fbbf24;
            min-height: 22px;
            text-align: center;
            max-width: 320px
        }

        canvas {
            border-radius: 12px;
            max-width: 95vw
        }

        #dice-area {
            display: flex;
            align-items: center;
            gap: 20px
        }

        .dice-face {
            font-size: 3rem;
            min-width: 50px;
            text-align: center
        }

        .dice-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: #fbbf24;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer
        }

        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 4px
        }

        .btn-g {
            background: #4ade80;
            color: #000
        }

        .btn-r {
            background: #ff4500;
            color: #fff
        }

        .btn-d {
            background: #222;
            color: #fff
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .97);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            color: #fff;
            gap: 16px;
            text-align: center;
            padding: 20px
        }

        #players-info {
            display: flex;
            gap: 30px;
            font-size: 0.85rem
        }

        .pinfo {
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700
        }
    </style>
</head>

<body>
    <button id="back" onclick="location.href='index.html'">← Back</button>
    <h1>🐍 Snake & Ladders</h1>
    <div id="reward">Reach Square 100 to WIN ₹1,000!</div>
    <div id="players-info">
        <div class="pinfo" style="background:rgba(255,68,68,.2);border:1px solid #ff4444">🔴 You: <span
                id="p1pos">1</span></div>
        <div class="pinfo" style="background:rgba(68,68,255,.2);border:1px solid #4444ff">🔵 AI: <span
                id="p2pos">1</span></div>
    </div>
    <canvas id="board" width="400" height="400"></canvas>
    <div id="dice-area">
        <button class="dice-btn" id="rollBtn" onclick="rollDice()">🎲 Roll!</button>
        <div class="dice-face" id="diceface">-</div>
    </div>
    <div id="status">Press Roll to start!</div>

    <div id="overlay">
        <div style="font-size:3rem" id="over-ico">🏆</div>
        <h2 id="over-title" style="font-size:2rem"></h2>
        <p id="over-msg"></p>
        <div id="over-btns"></div>
    </div>

    <script>
        const REWARD_URL = "https://emotionallytonightintelligent.com/yefth1e9e?key=672ebfd27cb3a77872d539957b23a796";
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const C = 40; const N = 10;

        // Snakes: {head: tail}
        const SNAKES = { 99: 20, 89: 70, 75: 32, 62: 18, 47: 26, 35: 6, 54: 44 };
        // Ladders: {bottom: top}
        const LADDERS = { 4: 46, 9: 31, 20: 38, 28: 84, 40: 59, 51: 67, 63: 81, 71: 91 };

        let p1 = 1, p2 = 1, turn = 'p1', gameOver = false, rolling = false;

        function numToGrid(n) {
            const idx = n - 1;
            const row = N - 1 - Math.floor(idx / N);
            const col = Math.floor(idx / N) % 2 === 0 ? idx % N : N - 1 - idx % N;
            return { r: row, c: col };
        }

        const DICE_FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        function drawBoard() {
            ctx.clearRect(0, 0, 400, 400);
            // Draw cells
            for (let sq = 1; sq <= 100; sq++) {
                const { r, c } = numToGrid(sq);
                const x = c * C, y = r * C;
                ctx.fillStyle = (sq % 2 === 0) ? '#1a1a2e' : '#16213e';
                if (SNAKES[sq]) ctx.fillStyle = '#2d0808';
                if (LADDERS[sq]) ctx.fillStyle = '#0d2d0d';
                ctx.fillRect(x, y, C, C);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5; ctx.strokeRect(x, y, C, C);
                ctx.fillStyle = 'rgba(255,255,255,.4)'; ctx.font = '8px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(sq, x + C / 2, y + C / 2);
            }

            // Draw snakes (red lines)
            ctx.lineWidth = 3;
            Object.entries(SNAKES).forEach(([h, t]) => {
                const hg = numToGrid(+h), tg = numToGrid(+t);
                ctx.strokeStyle = '#ff4444'; ctx.setLineDash([5, 3]);
                ctx.beginPath(); ctx.moveTo(hg.c * C + C / 2, hg.r * C + C / 2); ctx.lineTo(tg.c * C + C / 2, tg.r * C + C / 2); ctx.stroke();
                ctx.fillStyle = '#ff4444'; ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.setLineDash([]);
                ctx.fillText('🐍', hg.c * C + C / 2, hg.r * C + C / 2);
            });

            // Draw ladders (green lines)
            Object.entries(LADDERS).forEach(([bot, top]) => {
                const bg = numToGrid(+bot), tg = numToGrid(+top);
                ctx.strokeStyle = '#44ff44'; ctx.setLineDash([5, 3]);
                ctx.beginPath(); ctx.moveTo(bg.c * C + C / 2, bg.r * C + C / 2); ctx.lineTo(tg.c * C + C / 2, tg.r * C + C / 2); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillText('🪜', bg.c * C + C / 2, bg.r * C + C / 2);
            });
            ctx.lineWidth = 1;

            // Draw players
            function drawPlayer(pos, color, emoji) {
                const { r, c } = numToGrid(pos);
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(c * C + C / 2, r * C + C / 2, 10, 0, Math.PI * 2); ctx.fill();
                ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(emoji, c * C + C / 2, r * C + C / 2);
            }
            // Offset if same square
            if (p1 === p2) {
                const { r, c } = numToGrid(p1);
                ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(c * C + C / 2 - 6, r * C + C / 2, 8, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#4444ff'; ctx.beginPath(); ctx.arc(c * C + C / 2 + 6, r * C + C / 2, 8, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = '8px Arial';
                ctx.fillText('🔴', c * C + C / 2 - 6, r * C + C / 2); ctx.fillText('🔵', c * C + C / 2 + 6, r * C + C / 2);
            } else {
                drawPlayer(p1, '#ff4444', '🔴'); drawPlayer(p2, '#4444ff', '🔵');
            }
        }

        function movePlayer(pos, roll) {
            let newPos = pos + roll;
            if (newPos > 100) return pos; // can't move
            if (SNAKES[newPos]) { document.getElementById('status').textContent += ` 🐍 Snake! Down to ${SNAKES[newPos]}`; newPos = SNAKES[newPos]; }
            else if (LADDERS[newPos]) { document.getElementById('status').textContent += ` 🪜 Ladder! Up to ${LADDERS[newPos]}`; newPos = LADDERS[newPos]; }
            return newPos;
        }

        function rollDice() {
            if (gameOver || rolling || turn !== 'p1') return;
            rolling = true;
            document.getElementById('rollBtn').disabled = true;
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('diceface').textContent = DICE_FACES[roll - 1];
            const statusEl = document.getElementById('status');
            statusEl.textContent = `You rolled ${roll}!`;
            p1 = movePlayer(p1, roll);
            document.getElementById('p1pos').textContent = p1;
            drawBoard();
            if (p1 >= 100) { endGame(true); return; }

            setTimeout(() => {
                turn = 'p2';
                statusEl.textContent = "AI's turn...";
                setTimeout(aiRoll, 1000);
            }, 600);
        }

        function aiRoll() {
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('diceface').textContent = DICE_FACES[roll - 1];
            document.getElementById('status').textContent = `AI rolled ${roll}!`;
            p2 = movePlayer(p2, roll);
            document.getElementById('p2pos').textContent = p2;
            drawBoard();
            if (p2 >= 100) { endGame(false); return; }

            setTimeout(() => {
                turn = 'p1'; rolling = false;
                document.getElementById('rollBtn').disabled = false;
                document.getElementById('status').textContent = "Your turn — Roll!";
            }, 600);
        }

        function endGame(win) {
            if (gameOver) return; gameOver = true;
            const ol = document.getElementById('overlay'); ol.style.display = 'flex';
            document.getElementById('over-ico').textContent = win ? '🏆' : '😔';
            document.getElementById('over-title').textContent = win ? 'YOU WIN! ₹1,000' : 'AI WINS!';
            document.getElementById('over-msg').textContent = win ? 'You reached 100 first!' : 'AI got there first! Try again!';
            document.getElementById('over-btns').innerHTML = win
                ? `<a href="${REWARD_URL}" target="_blank" class="btn btn-g">💰 REDEEM ₹1,000</a><br><button class="btn btn-d" onclick="location.reload()">Play Again</button>`
                : `<button class="btn btn-r" onclick="location.reload()">🔄 TRY AGAIN</button><button class="btn btn-d" onclick="location.href='index.html'">← Home</button>`;
        }

        drawBoard();
    </script>
</body>

</html>
