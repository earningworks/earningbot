<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Crush | Win ₹2500</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0015;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding-top: 60px
        }

        #back {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff69b4, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px
        }

        #reward {
            color: #4ade80;
            font-weight: 800;
            font-size: .85rem;
            margin-bottom: 8px
        }

        #hud {
            display: flex;
            gap: 16px;
            margin-bottom: 8px
        }

        .hbox {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 800;
            text-align: center;
            font-size: .85rem
        }

        .hval {
            font-size: 1.2rem;
            color: #fbbf24
        }

        #progress-bar-wrap {
            width: min(360px, 95vw);
            margin-bottom: 8px
        }

        #progress-bar-bg {
            background: rgba(255, 255, 255, .1);
            border-radius: 10px;
            height: 10px;
            overflow: hidden
        }

        #progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff69b4, #fbbf24);
            border-radius: 10px;
            width: 0%;
            transition: width .4s
        }

        #progress-label {
            font-size: .72rem;
            color: rgba(255, 255, 255, .5);
            text-align: center;
            margin-bottom: 4px
        }

        canvas {
            border-radius: 16px;
            cursor: pointer;
            max-width: 95vw;
            touch-action: none;
            border: 2px solid rgba(255, 255, 255, .1)
        }

        #status {
            color: #fbbf24;
            font-size: .85rem;
            margin-top: 6px;
            text-align: center;
            min-height: 20px;
            font-weight: 700
        }

        #toast {
            background: rgba(255, 100, 180, .9);
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: .9rem;
            margin-top: 6px;
            display: none
        }

        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-size: .9rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 4px
        }

        .btn-g {
            background: #4ade80;
            color: #000
        }

        .btn-r {
            background: #ff4500;
            color: #fff
        }

        .btn-d {
            background: #222;
            color: #fff
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .97);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            color: #fff;
            gap: 16px;
            text-align: center;
            padding: 20px
        }
    </style>
</head>

<body>
    <button id="back" onclick="location.href='index.html'">← Back</button>
    <h1>🍬 Candy Crush</h1>
    <div id="reward">Score 1500 pts to WIN ₹2,500!</div>
    <div id="hud">
        <div class="hbox">Score<br><span class="hval" id="score">0</span></div>
        <div class="hbox">Target<br><span class="hval">1500</span></div>
        <div class="hbox">Moves<br><span class="hval" id="moves">40</span></div>
    </div>
    <div id="progress-bar-wrap">
        <div id="progress-label">Progress to reward 🍬</div>
        <div id="progress-bar-bg">
            <div id="progress-bar-fill"></div>
        </div>
    </div>
    <canvas id="gc" width="350" height="350"></canvas>
    <div id="status">Match 3+ candies of same color!</div>
    <div id="toast" id="toast-msg"></div>

    <div id="overlay">
        <div style="font-size:3rem" id="over-ico">🏆</div>
        <h2 id="over-title" style="font-size:2rem"></h2>
        <p id="over-msg"></p>
        <div id="over-btns"></div>
    </div>

    <script>
        const REWARD_URL = "https://emotionallytonightintelligent.com/yefth1e9e?key=672ebfd27cb3a77872d539957b23a796";
        const canvas = document.getElementById('gc'); const ctx = canvas.getContext('2d');
        const ROWS = 7, COLS = 7, CELL = 50;
        const WIN_SCORE = 1500, START_MOVES = 40;
        const CANDIES = ['🍎', '🍊', '🍋', '🫐', '🍇', '🍓'];
        const COLORS = ['#ff4444', '#ff8c00', '#ffd700', '#4169e1', '#9932cc', '#ff1493'];

        let board = [], score = 0, movesLeft = START_MOVES, gameOver = false, sel = null, animating = false, lastMilestone = 0;

        function showToast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1800);
        }

        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) { board[r] = []; for (let c = 0; c < COLS; c++)board[r][c] = Math.floor(Math.random() * 5); } // 5 types only (easier matches)
            for (let r = 0; r < ROWS; r++)for (let c = 0; c < COLS; c++) { while (hasMatchAt(r, c)) board[r][c] = Math.floor(Math.random() * 5); }
        }

        function hasMatchAt(r, c) {
            const v = board[r][c]; let h = 1, v2 = 1;
            let cc = c - 1; while (cc >= 0 && board[r][cc] === v) { h++; cc--; } cc = c + 1; while (cc < COLS && board[r][cc] === v) { h++; cc++; }
            let rr = r - 1; while (rr >= 0 && board[rr][c] === v) { v2++; rr--; } rr = r + 1; while (rr < ROWS && board[rr][c] === v) { v2++; rr++; }
            return h >= 3 || v2 >= 3;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1a0030'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++)for (let c = 0; c < COLS; c++) {
                const x = c * CELL, y = r * CELL, type = board[r][c];
                const col = COLORS[type];
                ctx.fillStyle = 'rgba(255,255,255,.04)'; ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
                const isSel = sel && sel.r === r && sel.c === c;
                ctx.fillStyle = col; ctx.shadowColor = col; ctx.shadowBlur = isSel ? 22 : 10;
                ctx.beginPath(); ctx.arc(x + CELL / 2, y + CELL / 2, isSel ? 22 : 18, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                ctx.font = `${isSel ? 24 : 20}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(CANDIES[type], x + CELL / 2, y + CELL / 2);
                if (isSel) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(x + CELL / 2, y + CELL / 2, 22, 0, Math.PI * 2); ctx.stroke(); }
            }
        }

        function findMatches() {
            const matched = new Set();
            for (let r = 0; r < ROWS; r++) { let s = 0; while (s < COLS) { let e = s; while (e < COLS && board[r][e] === board[r][s]) e++; if (e - s >= 3) for (let c = s; c < e; c++)matched.add(`${r},${c}`); s = e; } }
            for (let c = 0; c < COLS; c++) { let s = 0; while (s < ROWS) { let e = s; while (e < ROWS && board[e][c] === board[s][c]) e++; if (e - s >= 3) for (let r = s; r < e; r++)matched.add(`${r},${c}`); s = e; } }
            return matched;
        }

        function removeMatches(matched) {
            let pts = 0;
            matched.forEach(key => { const [r, c] = key.split(',').map(Number); board[r][c] = -1; pts += 10; });
            score += pts * matched.size;
            document.getElementById('score').textContent = score;
            const pct = Math.min(100, Math.round((score / WIN_SCORE) * 100));
            document.getElementById('progress-bar-fill').style.width = pct + '%';
            // Milestone toasts
            if (score >= 400 && lastMilestone < 400) { lastMilestone = 400; showToast('🍬 400 pts! Great combos!'); }
            else if (score >= 800 && lastMilestone < 800) { lastMilestone = 800; showToast('🔥 800 pts! More than halfway!'); }
            else if (score >= 1200 && lastMilestone < 1200) { lastMilestone = 1200; showToast('🏆 1200! Almost won! Keep going!'); }
            for (let c = 0; c < COLS; c++) { let empty = ROWS - 1; for (let r = ROWS - 1; r >= 0; r--) { if (board[r][c] !== -1) { if (empty !== r) { board[empty][c] = board[r][c]; board[r][c] = -1; } empty--; } } for (let r = empty; r >= 0; r--)board[r][c] = Math.floor(Math.random() * 5); }
        }

        function swap(r1, c1, r2, c2) { const t = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = t; }

        function trySwap(r1, c1, r2, c2) {
            if (gameOver || animating) return;
            if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) return;
            swap(r1, c1, r2, c2);
            const matched = findMatches();
            if (!matched.size) { swap(r1, c1, r2, c2); document.getElementById('status').textContent = 'No match — try another!'; return; }
            movesLeft--; document.getElementById('moves').textContent = movesLeft;
            animating = true;
            const cascade = () => { const m = findMatches(); if (!m.size) { animating = false; checkEnd(); return; } removeMatches(m); draw(); setTimeout(cascade, 280); };
            removeMatches(matched); draw(); setTimeout(cascade, 280);
        }

        function checkEnd() {
            if (score >= WIN_SCORE) endGame(true);
            else if (movesLeft <= 0) {
                const pct = Math.round((score / WIN_SCORE) * 100);
                if (pct >= 75) {
                    // Give 5 bonus moves if player is close!
                    movesLeft = 5; document.getElementById('moves').textContent = 5;
                    showToast('🎁 BONUS: 5 Extra Moves!'); document.getElementById('status').textContent = '💥 5 BONUS MOVES! Score ' + score + '/' + WIN_SCORE;
                } else { endGame(false); }
            }
        }

        function endGame(win) {
            if (gameOver) return; gameOver = true;
            const ol = document.getElementById('overlay'); ol.style.display = 'flex';
            document.getElementById('over-ico').textContent = win ? '🏆' : '😔';
            document.getElementById('over-title').textContent = win ? 'WINNER! ₹2,500' : 'OUT OF MOVES!';
            const pct = Math.round((score / WIN_SCORE) * 100);
            document.getElementById('over-msg').textContent = win ? `Score: ${score} pts!` : `Score: ${score}/${WIN_SCORE} (${pct}% there!)`;
            document.getElementById('over-btns').innerHTML = win
                ? `<a href="${REWARD_URL}" target="_blank" class="btn btn-g">💰 REDEEM ₹2,500</a><br><button class="btn btn-d" onclick="location.reload()">Play Again</button>`
                : `<p style="color:#fbbf24;font-size:.85rem">${pct >= 70 ? 'SO CLOSE! One more try!' : 'Keep playing to improve!'}</p><button class="btn btn-r" onclick="location.reload()">🔄 TRY AGAIN</button><button class="btn btn-d" onclick="location.href='index.html'">← Home</button>`;
        }

        canvas.addEventListener('click', e => {
            if (gameOver || animating) return;
            const rect = canvas.getBoundingClientRect();
            const c = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width) / CELL);
            const r = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height) / CELL);
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            if (!sel) { sel = { r, c }; } else if (sel.r === r && sel.c === c) { sel = null; }
            else { trySwap(sel.r, sel.c, r, c); sel = null; }
            draw();
        });

        initBoard(); draw();
    </script>
</body>

</html>
