<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drift 3D | Win ₹3000</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #050505;
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none
        }

        canvas {
            display: block
        }

        #hud {
            position: fixed;
            top: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 100;
            pointer-events: none
        }

        .hbox {
            background: rgba(0, 0, 0, .8);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, .1)
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            color: #fff;
            gap: 16px;
            text-align: center;
            padding: 20px
        }

        #overlay h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00d2ff, #fbbf24);
            background-clip: text; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 4px
        }

        .btn-g {
            background: #4ade80;
            color: #000
        }

        .btn-y {
            background: #fbbf24;
            color: #000
        }

        .btn-r {
            background: #ff4500;
            color: #fff
        }

        .btn-d {
            background: #222;
            color: #fff
        }

        #ctrls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 200
        }

        .cbtn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, .2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent
        }

        #back {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 400;
            background: rgba(0, 0, 0, .7);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer
        }
    </style>
</head>

<body>
    <button id="back" onclick="location.href='index.html'">← Back</button>
    <div id="hud">
        <div class="hbox">🏎️ <span id="speed">0</span> km/h</div>
        <div class="hbox">⏱️ <span id="tdisp">60</span>s</div>
        <div class="hbox">🏁 Laps: <span id="laps">0</span>/3</div>
    </div>
    <div id="ctrls">
        <div class="cbtn" id="lbtn">◀</div>
        <div class="cbtn" id="rbtn">▶</div>
    </div>
    <div id="overlay">
        <div style="font-size:3rem">🏎️</div>
        <h1>Neon Drift 3D</h1>
        <p style="color:#fbbf24;font-size:1.2rem;font-weight:800">WIN ₹3,000!</p>
        <p style="color:rgba(255,255,255,.6)">Complete 3 laps in 60s — avoid traffic!</p>
        <button class="btn btn-g" onclick="startGame()">▶ START RACE</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script>
        const W = window.innerWidth, H = window.innerHeight;
        const REWARD_URL = "https://emotionallytonightintelligent.com/yefth1e9e?key=672ebfd27cb3a77872d539957b23a796";
        let gameActive = false, time = 60, laps = 0, animId, scoreTimer;
        let steerLeft = false, steerRight = false;
        let carSpeed = 0.4, carX = 0, carRot = 0, lapProgress = 0;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(W, H); renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.insertBefore(renderer.domElement, document.body.firstChild);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000510);
        scene.fog = new THREE.Fog(0x000510, 30, 120);

        const camera = new THREE.PerspectiveCamera(65, W / H, 0.1, 300);
        camera.position.set(0, 4, 8); camera.lookAt(0, 0, -10);

        // Lights
        scene.add(new THREE.AmbientLight(0x112244, 0.8));
        const dLight = new THREE.DirectionalLight(0x00d2ff, 1.5);
        dLight.position.set(10, 30, 10); scene.add(dLight);

        // Track — circular road segments
        const TRACK_R = 40; const SEGS = 60;
        const trackGroup = new THREE.Group(); scene.add(trackGroup);
        for (let i = 0; i < SEGS; i++) {
            const a = ((i / SEGS) * Math.PI * 2);
            const roadSeg = new THREE.Mesh(
                new THREE.BoxGeometry(10, 0.3, 7),
                new THREE.MeshPhongMaterial({ color: 0x1a1a2e })
            );
            roadSeg.position.set(Math.cos(a) * TRACK_R, 0, Math.sin(a) * TRACK_R);
            roadSeg.rotation.y = -a;
            roadSeg.receiveShadow = true;
            scene.add(roadSeg);
            // Neon kerb
            const kerb = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 7), new THREE.MeshPhongMaterial({ color: 0x00d2ff, emissive: 0x002244 }));
            kerb.position.set(Math.cos(a) * (TRACK_R + 5.5), 0.35, Math.sin(a) * (TRACK_R + 5.5));
            kerb.rotation.y = -a; scene.add(kerb);
        }

        // Track surface (wide disk)
        const trackSurf = new THREE.Mesh(new THREE.TorusGeometry(TRACK_R, 5, 8, 60), new THREE.MeshPhongMaterial({ color: 0x111122 }));
        trackSurf.rotation.x = -Math.PI / 2; scene.add(trackSurf);

        // Player car
        const carGroup = new THREE.Group();
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 2.5), new THREE.MeshPhongMaterial({ color: 0x4ade80, emissive: 0x1a6630 }));
        carGroup.add(carBody);
        const carTop = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 1.2), new THREE.MeshPhongMaterial({ color: 0x4ade80, emissive: 0x1a6630 }));
        carTop.position.set(0, 0.5, 0); carGroup.add(carTop);
        // Wheels
        for (let wx of [-0.8, 0.8]) for (let wz of [-0.9, 0.9]) {
            const w = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15, 8), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            w.rotation.z = Math.PI / 2; w.position.set(wx, -0.25, wz); carGroup.add(w);
        }
        carGroup.position.set(TRACK_R, 0.5, 0);
        scene.add(carGroup);

        // Traffic cars
        const traffic = [];
        for (let i = 0; i < 5; i++) {
            const tCar = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.2), new THREE.MeshPhongMaterial({ color: [0xff4500, 0x9333ea, 0xff0066, 0x0088ff, 0xffcc00][i] }));
            const angle = (i / 5) * Math.PI * 2 + 0.5;
            tCar.position.set(Math.cos(angle) * TRACK_R, 0.5, Math.sin(angle) * TRACK_R);
            scene.add(tCar);
            traffic.push({ mesh: tCar, angle, speed: 0.005 + Math.random() * 0.005, offset: (i % 3 - 1) * 3 });
        }

        let carAngle = 0;

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; time = 60; laps = 0; carAngle = 0; lapProgress = 0;
            document.getElementById('tdisp').textContent = 60;
            document.getElementById('laps').textContent = '0';
            scoreTimer = setInterval(() => { if (!gameActive) return; time--; document.getElementById('tdisp').textContent = time; if (time <= 0 && laps < 3) endGame(false); }, 1000);
            animate();
        }

        function endGame(win) {
            gameActive = false; cancelAnimationFrame(animId); clearInterval(scoreTimer);
            const ol = document.getElementById('overlay'); ol.style.display = 'flex';
            if (win) {
                ol.innerHTML = `<div style="font-size:3rem">🏆</div><h1 style="font-size:2rem;color:#4ade80">WINNER! ₹3,000</h1><p style="color:rgba(255,255,255,.6)">3 Laps completed! You're a legend!</p><a href="${REWARD_URL}" target="_blank" class="btn btn-g">💰 REDEEM ₹3,000</a><button class="btn btn-d" onclick="location.reload()">Race Again</button><button class="btn btn-d" onclick="location.href='index.html'">← Home</button>`;
            } else {
                ol.innerHTML = `<div style="font-size:3rem">⏰</div><h1 style="font-size:2rem;color:#ff4500">TIME'S UP!</h1><p style="color:rgba(255,255,255,.6)">Laps: ${laps}/3 — So close!</p><button class="btn btn-r" onclick="location.reload()">🔄 TRY AGAIN</button><button class="btn btn-d" onclick="location.href='index.html'">← Home</button>`;
            }
        }

        function animate() {
            animId = requestAnimationFrame(animate);
            if (!gameActive) return;

            // Steer
            if (steerLeft) carAngle += 0.015;
            if (steerRight) carAngle -= 0.015;

            carAngle += 0.008; // constant forward movement
            lapProgress += 0.008 / (Math.PI * 2);
            if (lapProgress >= 1) { lapProgress = 0; laps++; document.getElementById('laps').textContent = laps; if (laps >= 3) endGame(true); }

            const cx = Math.cos(carAngle) * TRACK_R;
            const cz = Math.sin(carAngle) * TRACK_R;
            carGroup.position.set(cx, 0.5, cz);
            carGroup.rotation.y = -(carAngle + Math.PI / 2);

            // Camera follow
            const camD = 12;
            camera.position.set(cx + Math.cos(carAngle) * camD, 5, cz + Math.sin(carAngle) * camD);
            camera.lookAt(cx - Math.cos(carAngle) * 5, 0, cz - Math.sin(carAngle) * 5);

            // Update speedometer
            document.getElementById('speed').textContent = Math.round(80 + laps * 20);

            // Move traffic
            traffic.forEach(t => {
                t.angle += t.speed;
                const tx = Math.cos(t.angle) * (TRACK_R + t.offset);
                const tz = Math.sin(t.angle) * (TRACK_R + t.offset);
                t.mesh.position.set(tx, 0.5, tz);
                t.mesh.rotation.y = -(t.angle + Math.PI / 2);
                // Collision
                if (Math.abs(tx - cx) < 1.5 && Math.abs(tz - cz) < 1.5) endGame(false);
            });

            renderer.render(scene, camera);
        }

        // Input
        document.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') steerLeft = true; if (e.key === 'ArrowRight') steerRight = true; });
        document.addEventListener('keyup', e => { if (e.key === 'ArrowLeft') steerLeft = false; if (e.key === 'ArrowRight') steerRight = false; });
        document.getElementById('lbtn').addEventListener('touchstart', e => { e.preventDefault(); steerLeft = true; });
        document.getElementById('lbtn').addEventListener('touchend', e => { e.preventDefault(); steerLeft = false; });
        document.getElementById('rbtn').addEventListener('touchstart', e => { e.preventDefault(); steerRight = true; });
        document.getElementById('rbtn').addEventListener('touchend', e => { e.preventDefault(); steerRight = false; });
        document.getElementById('lbtn').addEventListener('mousedown', () => steerLeft = true);
        document.getElementById('lbtn').addEventListener('mouseup', () => steerLeft = false);
        document.getElementById('rbtn').addEventListener('mousedown', () => steerRight = true);
        document.getElementById('rbtn').addEventListener('mouseup', () => steerRight = false);

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        renderer.render(scene, camera);
    </script>
</body>

</html>
